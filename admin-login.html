<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login Admin - Spin Wheel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }
    input, button {
      margin: 10px;
      padding: 10px;
      font-size: 16px;
    }
    button {
      cursor: pointer;
    }
    #loginForm {
      max-width: 400px;
      margin: auto;
      padding: 20px;
      background-color: #333;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<h1>Login Admin</h1>

<div id="loginForm">
  <input type="text" id="adminUsername" placeholder="Username" required><br>
  <input type="password" id="adminPassword" placeholder="Password" required><br>
  <button onclick="login()">Login</button>
  <p id="loginMessage" style="color:red;"></p>
</div>

<script>
  const correctUsername = "admin"; // Username admin
  const correctPassword = "password123"; // Password admin
  
  // Cek login
  function login() {
    const username = document.getElementById("adminUsername").value;
    const password = document.getElementById("adminPassword").value;
    const loginMessage = document.getElementById("loginMessage");

    if (username === correctUsername && password === correctPassword) {
      // Simpan status login ke localStorage
      localStorage.setItem("isAdminLoggedIn", true);
      window.location.href = "admin-panel.html"; // Arahkan ke Admin Panel setelah login sukses
    } else {
      loginMessage.textContent = "Username atau Password salah!";
    }
  }
</script>

</body>
</html>
