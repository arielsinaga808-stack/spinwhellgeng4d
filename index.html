<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>SPIN WHELL GACOR GENG4D</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #ffcc00, #8b0000);
  text-align: center;
  color: white;
  font-family: Arial, sans-serif;
}

h1 {
  margin-top: 20px;
  text-shadow: 0 0 20px yellow, 0 0 40px red;
}

input, button {
  padding: 10px;
  font-size: 18px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
}

button {
  background: gold;
  cursor: pointer;
  box-shadow: 0 0 15px yellow;
}

button:hover {
  transform: scale(1.1);
}

canvas {
  margin-top: 20px;
  border-radius: 50%;
  box-shadow: 0 0 40px gold;
}

#jackpot {
  font-size: 40px;
  color: gold;
  display: none;
  margin-top: 20px;
  text-shadow: 0 0 20px yellow;
}
</style>
</head>

<body>

<h1>🎰 SPIN WHELL GACOR GENG4D</h1>

<input id="code" placeholder="MASUKKAN KODE">
<br>
<button onclick="spin()">SPIN</button>

<canvas id="wheel" width="400" height="400"></canvas>

<div id="jackpot">💰 JACKPOT 💰</div>

<script>
const prizes = [
  "10.000",
  "ZX1000RR",
  "50.000",
  "FORTUNER VRZ",
  "100.000",
  "VESPA SPRINT",
  "1.000.000",
  "HONDA BRIO",
  "2.000.000"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let angle = 0;
let spinning = false;

function drawWheel() {
  const arc = (2 * Math.PI) / prizes.length;

  for (let i = 0; i < prizes.length; i++) {
    ctx.beginPath();
    ctx.fillStyle = i % 2 ? "#FFD700" : "#8B0000";
    ctx.moveTo(200, 200);
    ctx.arc(200, 200, 200, i * arc, (i + 1) * arc);
    ctx.fill();

    ctx.save();
    ctx.translate(200, 200);
    ctx.rotate(i * arc + arc / 2);
    ctx.fillStyle = "black";
    ctx.fillText(prizes[i], 100, 10);
    ctx.restore();
  }
}

drawWheel();

function easeOut(t) {
  return 1 - Math.pow(1 - t, 4);
}

function spin() {
  if (spinning) return;

  const code = document.getElementById("code").value;
  if (!code) {
    alert("Masukkan kode dulu!");
    return;
  }

  spinning = true;

  let duration = 5000;
  let start = null;

  let endAngle = Math.random() * 360 + 3600;

  function animate(time) {
    if (!start) start = time;

    let progress = (time - start) / duration;
    if (progress > 1) progress = 1;

    let eased = easeOut(progress);

    angle = endAngle * eased;

    ctx.clearRect(0, 0, 400, 400);

    ctx.save();
    ctx.translate(200, 200);
    ctx.rotate(angle * Math.PI / 180);
    ctx.translate(-200, -200);
    drawWheel();
    ctx.restore();

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      spinning = false;

      const result = prizes[Math.floor(Math.random() * prizes.length)];

      if (result.includes("BRIO") || result.includes("FORTUNER")) {
        document.getElementById("jackpot").style.display = "block";
      }

      alert("🎉 Kamu dapat: " + result);
    }
  }

  requestAnimationFrame(animate);
}
</script>

</body>
</html>
