<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>SPIN WHEEL GENG4D</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #ff0033, #000);
  font-family: Arial;
  color: white;
  text-align: center;
}

.container {
  margin-top: 20px;
}

.pointer {
  width: 0;
  height: 0;
  margin: auto;
  border-left: 20px solid transparent;
  border-right: 20px solid transparent;
  border-bottom: 40px solid red;
  filter: drop-shadow(0 0 10px red);
}

canvas {
  margin-top: 10px;
  border-radius: 50%;
  box-shadow: 0 0 50px gold;
}

input {
  margin-top: 15px;
  padding: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  text-align: center;
}

button {
  margin-top: 10px;
  padding: 12px 30px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  background: black;
  color: #ff0044;
  box-shadow: 0 0 15px #ff0044;
  cursor: pointer;
}

button:hover {
  box-shadow: 0 0 30px #ff0044;
}
</style>
</head>

<body>

<h1>🎰 SPIN WHEEL GACOR GENG4D</h1>

<div class="container">
  <div class="pointer"></div>

  <canvas id="wheel" width="400" height="400"></canvas>

  <br>

  <input id="code" placeholder="MASUKKAN KODE">
  <br>

  <button onclick="spin()">SPIN</button>
</div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const prizes = [
  "10K","ZX1000RR","50K","FORTUNER",
  "100K","VESPA","1JT","BRIO","2JT"
];

let currentAngle = 0;

/* gambar wheel */
function drawWheel() {
  const arc = (2 * Math.PI) / prizes.length;

  for (let i = 0; i < prizes.length; i++) {
    ctx.beginPath();
    ctx.fillStyle = i % 2 ? "#FFD700" : "#8B0000";
    ctx.moveTo(200, 200);
    ctx.arc(200, 200, 200, i * arc, (i + 1) * arc);
    ctx.fill();

    ctx.save();
    ctx.translate(200, 200);
    ctx.rotate(i * arc + arc / 2);
    ctx.fillStyle = "black";
    ctx.font = "bold 14px Arial";
    ctx.fillText(prizes[i], 80, 10);
    ctx.restore();
  }
}
drawWheel();

/* easing */
function easeOut(t) {
  return 1 - Math.pow(1 - t, 4);
}

/* =========================
   API (Google Apps Script)
========================= */

// GANTI URL INI
const API = "https://script.google.com/macros/s/AKfycbxb4jikeZgOwBLwQ_7vAj_adq3Ch4cPg9deimKmcd7h1f7cxvp5L3PomgubKmRdg215/exec";

async function cekKode(kode){
  const res = await fetch(API + "?action=cekKode&kode=" + kode);
  const data = await res.json();
  return data.valid;
}

async function getRTP(){
  const res = await fetch(API + "?action=getRTP");
  return await res.json();
}

async function getHadiah(){
  const rtp = await getRTP();

  let rand = Math.random() * 100;
  let total = 0;

  for(let item of rtp){
    total += item.peluang;
    if(rand <= total) return item.hadiah;
  }

  return rtp[0].hadiah;
}

/* =========================
   SPIN
========================= */

async function spin() {
  const kode = document.getElementById("code").value;

  let valid = await cekKode(kode);

  if (!valid) {
    alert("❌ Kode tidak valid!");
    return;
  }

  let hadiah = await getHadiah();

  let index = prizes.indexOf(hadiah);
  if(index === -1) index = 0;

  let arc = 360 / prizes.length;

  let target = 360 - (index * arc) - arc / 2;
  let finalAngle = 360 * 5 + target;

  let start = null;
  let duration = 5000;

  function animate(time) {
    if (!start) start = time;

    let progress = (time - start) / duration;
    if (progress > 1) progress = 1;

    let eased = easeOut(progress);

    currentAngle = finalAngle * eased;

    canvas.style.transform = `rotate(${currentAngle}deg)`;

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      alert("🎉 Kamu dapat: " + hadiah);
    }
  }

  requestAnimationFrame(animate);
}
</script>

</body>
</html>
